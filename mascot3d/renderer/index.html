<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- blob:/data: needed: GLTFLoader serves the VRM's embedded textures via blob URLs -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' blob: data:; script-src 'self'; style-src 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' blob: data:"
    />
    <title>Miku</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
        width: 100%;
        height: 100%;
        user-select: none;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <script src="dist/bundle.js"></script>
  </body>
</html>
